name: ClaimShield CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master

jobs:
  # Stage 1: Build the Docker Images and Push to Docker Hub
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate with Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: anujgope/claimshield-backend:latest

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: anujgope/claimshield-frontend:latest

  # Stage 2: Connect to EC2 and Deploy the Built Images
  deploy-production:
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Securely Copy Compose File to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/${{ secrets.EC2_USER }}/claimshield/"

      - name: Execute Remote SSH Deployment
        uses: appleboy/ssh-action@master
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKER_USERNAME,DOCKER_PASSWORD
          script: |
            # 1. Login to Docker Hub explicitly using sudo to bypass EC2 user permission issues
            echo "$DOCKER_PASSWORD" | sudo docker login -u "$DOCKER_USERNAME" --password-stdin
            
            # 2. Navigate to the scp payload dir
            cd /home/${{ secrets.EC2_USER }}/claimshield
            
            # 3. Use sudo for Compose to pull the newest images and spin them up
            sudo docker compose pull || sudo docker-compose pull
            sudo docker compose up -d || sudo docker-compose up -d
            
            # 4. Clean up old dangling images to avoid the EC2 storage filling up
            sudo docker image prune -af
